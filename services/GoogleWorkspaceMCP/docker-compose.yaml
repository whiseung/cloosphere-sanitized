# Google Workspace MCP — Gmail/Calendar 도구를 external OAuth 2.1 passthrough 모드로 제공.
#
# Cloosphere 와 "완전 별개"인 독립 서비스. Cloosphere 는 이 컨테이너의 /mcp/ 엔드포인트에
# 기존 Tool Connections(Auth Type=OAuth 2.0 / Provider=Google)로만 연결한다 → Cloosphere 코드 변경 0.
#
# 동작 흐름:
#   1) 사용자가 Cloosphere 에 Google 로그인 → access_token(GMAIL_DELEGATED_SCOPES 의 전체 GWS 스코프 포함)이 저장됨
#   2) 에이전트 도구 호출 시 Cloosphere 가 그 사용자의 토큰을 매 호출 Authorization: Bearer 로 주입
#   3) 이 서버는 자체 OAuth 를 "안 돌리고" 인바운드 Bearer 를 Google userinfo 로 검증 후 그대로
#      Gmail/Calendar API 에 사용 (per-request stateless → 사용자별 격리, 자격증명 저장 없음)
#
# 모든 설정은 같은 폴더의 .env 로 주입 (.env.example 복사해서 채울 것). 연결법/주의사항: ./README.md
services:
  gws-mcp:
    build:
      context: .
      args:
        WORKSPACE_MCP_VERSION: ${WORKSPACE_MCP_VERSION:-1.21.0}
    container_name: gws-mcp
    restart: unless-stopped
    ports:
      # 호스트:컨테이너. MCP 엔드포인트는 이 포트의 /mcp (끝 슬래시 없이 — /mcp/ 는 307 redirect).
      - "${GWS_MCP_PORT:-8000}:8000"
    environment:
      # ── 핵심: external OAuth 2.1 passthrough 모드 ──────────────────────────────
      # 이 두 값이 true 여야 서버가 자체 OAuth 플로우를 안 돌리고 인바운드 Bearer 만 신뢰한다.
      # ⚠️ stateful 자격증명 저장 모드(이 토글 없이 client_secret.json 사용)는 과거 멀티유저
      #    격리 이슈가 있었으므로 절대 쓰지 말 것 — 반드시 아래 passthrough 모드로 운용.
      - MCP_ENABLE_OAUTH21=true
      - EXTERNAL_OAUTH21_PROVIDER=true
      - WORKSPACE_MCP_PORT=8000
      # 인바운드 토큰 검증용. ⚠️ Cloosphere 로그인에 쓰는 것과 "동일한" Google OAuth 클라이언트.
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:?set GOOGLE_OAUTH_CLIENT_ID in .env}
      # confidential 클라이언트면 시크릿도(Cloosphere 와 동일). public PKCE 면 비우고 JWT 키 사용.
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - FASTMCP_SERVER_AUTH_GOOGLE_JWT_SIGNING_KEY=${FASTMCP_SERVER_AUTH_GOOGLE_JWT_SIGNING_KEY:-}
      # 리버스 프록시 뒤일 때만 외부 공개 URL.
      - WORKSPACE_EXTERNAL_URL=${WORKSPACE_EXTERNAL_URL:-}
    extra_hosts:
      # Cloosphere 가 호스트에서 돌고 이 컨테이너가 호스트의 다른 서비스를 가리킬 때 대비.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # auth-gated 서버라 무인증 GET 은 401/406 → HTTP 200 을 기대할 수 없다.
      # 따라서 TCP 연결 가능 여부만으로 "기동 완료"를 판정한다.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import socket; socket.create_connection(('localhost',8000),3).close()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
