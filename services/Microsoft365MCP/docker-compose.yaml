# Microsoft 365 MCP — Outlook/Calendar/Teams/SharePoint/OneDrive 도구를 external OAuth 2.1
# passthrough 모드로 제공. Cloosphere 와 "완전 별개"인 독립 서비스 (GoogleWorkspaceMCP 와 대칭).
# Cloosphere 는 이 컨테이너의 /mcp 엔드포인트에 기존 Tool Connections(Auth Type=OAuth 2.0 /
# Provider=Microsoft)로만 연결한다 → Cloosphere 백엔드 코드 변경 0.
#
# 동작 흐름:
#   1) 사용자가 Cloosphere 에 Microsoft 로그인 → access_token(Graph delegated 스코프 포함) 저장
#   2) 에이전트 도구 호출 시 Cloosphere 가 그 사용자의 토큰을 매 호출 Authorization: Bearer 로 주입
#   3) 이 서버는 자체 OAuth 를 "안 돌리고" 인바운드 Bearer 를 그대로 Microsoft Graph 에 사용
#      (per-request stateless → 사용자별 격리, 자격증명 저장 없음)
#
# 모든 설정은 같은 폴더의 .env 로 주입 (.env.example 복사해서 채울 것). 연결법/주의사항: ./README.md
services:
  m365-mcp:
    build:
      context: .
      args:
        MS365_MCP_VERSION: ${MS365_MCP_VERSION:-0.114.0}
    container_name: m365-mcp
    restart: unless-stopped
    ports:
      # 호스트:컨테이너. MCP 엔드포인트는 이 포트의 /mcp (끝 슬래시 없이 — /mcp/ 는 redirect).
      - "${M365_MCP_PORT:-8001}:8001"
    environment:
      # ── org/work 계정 도구 활성화 (Teams/Chats/SharePoint Sites/공유메일함/온라인미팅) ──
      # true 면 --org-mode 와 동일. ⚠️ Teams chat/channel·온라인미팅 도구는 Cloosphere 의
      #   GRAPH_DELEGATED_SCOPES 에 ChannelMessage.Read.All / Chat.Read / OnlineMeetings.Read
      #   등을 추가하고 재로그인해야 실동작(기본 스코프는 Mail/Calendar/Files/SharePoint(read)/
      #   Contacts/Tasks/Notes 까지 커버). false 면 개인 위임 도구만 노출.
      - MS365_MCP_ORG_MODE=${M365_MCP_ORG_MODE:-true}
      # ── (선택) 인바운드 토큰 검증 일관성을 위해 Cloosphere 와 동일 클라이언트/테넌트 ──
      # 비우면 softeria 내장 멀티테넌트 앱('common') 사용. passthrough 모드에선 필수 아님.
      - MS365_MCP_CLIENT_ID=${MS365_MCP_CLIENT_ID:-}
      - MS365_MCP_TENANT_ID=${MS365_MCP_TENANT_ID:-}
      # ── (선택) 운용 ──
      - READ_ONLY=${M365_MCP_READ_ONLY:-false}
      - LOG_LEVEL=${M365_MCP_LOG_LEVEL:-info}
      # ⚠️ 의도적으로 주입하지 않음 (각각 R1/R3 를 깸):
      #   MS365_MCP_OAUTH_TOKEN  — startup 정적 단일 토큰 = 모든 사용자 공유(단일유저화)
      #   MS365_MCP_CLIENT_SECRET — passthrough 에 불필요(설정 시 confidential/OBO 경로로 빠짐)
    extra_hosts:
      # Cloosphere 가 호스트에서 돌고 이 컨테이너가 호스트의 다른 서비스를 가리킬 때 대비.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # auth-gated 서버라 무인증 GET 은 401 → HTTP 200 을 기대할 수 없다.
      # 따라서 TCP 연결 가능 여부만으로 "기동 완료"를 판정한다(node 는 이미지에 포함).
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('net').connect(8001,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
