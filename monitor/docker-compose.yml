services:
  ##################################################
  # 모니터링 코어
  ##################################################

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    user: "472"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=http://localhost:3000

  ##################################################
  # 로그 저장 (Loki)
  # OTEL Collector에서 앱 로그를 수신하여 Grafana에서 조회
  ##################################################

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./data/loki:/loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  ##################################################
  # OTEL Collector
  # 앱의 traces/metrics를 수집하여 Prometheus에 노출
  # 앱에 ENABLE_OTEL=true, OTEL_EXPORTER_OTLP_ENDPOINT 설정 필요
  ##################################################

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    volumes:
      - ./otel-collector.yml:/etc/otelcol-contrib/config.yaml
    ports:
      - "4317:4317"   # OTLP gRPC (앱→Collector)
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus exporter (Collector→Prometheus)


  ##################################################
  # PostgreSQL 모니터링
  ##################################################

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_DATA_SOURCE}
    ports:
      - "9187:9187"

  ##################################################
  # Redis 모니터링 (Azure Redis Cache TLS 지원)
  ##################################################

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: ${REDIS_ADDR}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_EXPORTER_SKIP_TLS_VERIFICATION: "true"
    ports:
      - "9121:9121"
