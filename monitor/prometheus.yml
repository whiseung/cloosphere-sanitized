global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Cloosphere 앱 메트릭 (OTEL Collector 경유)
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8889"]

  # PostgreSQL
  - job_name: "postgresql"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  # Redis
  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
