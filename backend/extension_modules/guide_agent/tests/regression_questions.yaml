# Guide Q&A 회귀 질문 셋 (80+).
#
# 각 항목:
#   - question: 사용자가 입력할 자연어 질문
#   - expected_categories: 정답 카테고리 ID 후보 (top-3 안에 들어와야 함)
#   - role: 'user' | 'admin' (audience 필터 검증용; 기본 user)
#   - lang: 'ko' | 'en' (langdetect 기대값)
#   - tag: 'literal' | 'paraphrase' | 'cross-cut' | 'admin-blocked' (분류용)

version: 1
questions:
  # === Literal: 카테고리 명·기능명을 직접 언급 ===
  - { question: "첫 대화 시작하는 법", expected_categories: ["getting-started/first-chat"], lang: ko, tag: literal }
  - { question: "How do I log in?", expected_categories: ["getting-started/login"], lang: en, tag: literal }
  - { question: "UI 둘러보기", expected_categories: ["getting-started/ui-overview"], lang: ko, tag: literal }
  - { question: "What is Cloosphere?", expected_categories: ["getting-started/overview", "index"], lang: en, tag: literal }
  - { question: "채팅 모델 선택 방법", expected_categories: ["chat/models"], lang: ko, tag: literal }
  - { question: "대화 기록 관리", expected_categories: ["chat/conversations"], lang: ko, tag: literal }
