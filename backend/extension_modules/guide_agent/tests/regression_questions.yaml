  - { question: "지식 그래프와 용어집 차이점", expected_categories: ["workspace/knowledge-graph", "workspace/glossary"], lang: ko, tag: cross-cut }
  - { question: "프로젝트 안에서 채널 생성", expected_categories: ["collaboration/projects", "collaboration/channels"], lang: ko, tag: cross-cut }
  - { question: "RAG 답변에 출처가 표시되나?", expected_categories: ["chat/files-and-rag", "workspace/knowledge"], lang: ko, tag: cross-cut }
  - { question: "Memory and conversations", expected_categories: ["chat/memory", "chat/conversations"], lang: en, tag: cross-cut }

