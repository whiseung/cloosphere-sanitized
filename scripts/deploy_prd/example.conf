###############################################################################
# Cloosphere Production 파라미터 파일
# 복사하여 고객사별로 생성: cp example.conf <고객사명>.conf
#
# 사용법: ./deploy-prd.sh <고객사명>.conf
#         ./deploy-prd.sh <고객사명>.conf delete
###############################################################################

# Azure 테넌트/구독
TENANT_ID=""
SUBSCRIPTION_ID=""

# 고객사명 (영문 소문자, 숫자, 하이픈 / 리소스 이름 접두사로 사용)
CUSTOMER="example"

# PostgreSQL
PG_ADMIN="pgsqladmin"
PG_PASSWORD=""                         # 비워두면 자동 생성

# ACR (컨테이너 레지스트리)
ACR_URL=""                             # 예: https://myacr.azurecr.io
ACR_TOKEN_NAME=""                      # 예: prd-pull-token
ACR_TOKEN_PASSWORD=""                  # 토큰 비밀번호 (_repositories_pull scope)
ACR_IMAGE=""                           # 예: myacr.azurecr.io/cloosphere:latest

###############################################################################
# 리소스 사양 — 필요 시 조정
###############################################################################

LOCATION="koreacentral"

# PostgreSQL (General Purpose for production)
PG_SKU="Standard_D2s_v3"              # 2 vCPU, 8 GB
PG_TIER="GeneralPurpose"
PG_STORAGE=128                         # GB
PG_VERSION="16"

# App Service
APP_SKU="P1V4"

# Redis
REDIS_SKU="Basic"
REDIS_SIZE="C1"

# Search
SEARCH_SKU="standard"                  # S1

# Storage
FILE_SHARE="appdata"
BLOB_CONTAINER="media"

###############################################################################
# 네트워크 — 고객 환경에 맞게 조정
###############################################################################

VNET_CIDR="10.0.0.0/16"

# App Service VNet Integration (Microsoft.Web/serverFarms 위임)
SUBNET_APP="10.0.1.0/26"              # /26 = 64 IPs

# Private Endpoint 전용 서브넷
SUBNET_PE="10.0.2.0/26"               # /26 = 64 IPs

# PostgreSQL Flexible Server (Microsoft.DBforPostgreSQL/flexibleServers 위임)
SUBNET_PG="10.0.3.0/28"               # /28 = 16 IPs

###############################################################################
# Front Door + WAF (선택) — 비워두면 배포하지 않음
#
# App Service 앞에 Azure Front Door를 배치하여 WAF, DDoS 방어,
# 글로벌 캐싱, SSL 오프로드, 원본 은닉 등을 제공합니다.
#
# ┌──────────────────────────────────────────────────────────────┐
# │ SKU 비교                                                     │
# ├─────────────────────┬────────────────────────────────────────┤
# │ Standard (~$35/월)  │ 커스텀 규칙, IP/Geo 제한, Rate Limit  │
# │                     │ DDoS L3/L4, 캐싱, SSL 오프로드        │
# ├─────────────────────┼────────────────────────────────────────┤
# │ Premium (~$330/월)  │ Standard 전체 +                       │
# │                     │ OWASP 관리형 규칙 (SQLi, XSS 자동차단)│
# │                     │ Bot Manager (악성 봇 자동 분류)       │
# │                     │ Private Link Origin (원본 완전 은닉)  │
# │                     │ → 엔터프라이즈/금융/공공 권장          │
# └─────────────────────┴────────────────────────────────────────┘
###############################################################################

AFD_ENABLED=""                         # "true"로 설정하면 Front Door + WAF 배포
AFD_SKU="Standard_AzureFrontDoor"     # Standard_AzureFrontDoor | Premium_AzureFrontDoor
AFD_WAF_MODE="Prevention"             # Detection (탐지만, 로그 기록) | Prevention (탐지+차단)
