###############################################################################
# Cloosphere PoC 파라미터 파일
# 복사하여 고객사별로 생성: cp example.conf <고객사명>.conf
#
# 사용법: ./deploy-poc.sh <고객사명>.conf
#         ./deploy-poc.sh <고객사명>.conf delete
###############################################################################

# Azure 테넌트/구독
TENANT_ID=""
SUBSCRIPTION_ID=""

# 고객사명 (영문 소문자, 숫자, 하이픈 / 리소스 이름 접두사로 사용)
CUSTOMER="example"

# PostgreSQL
PG_ADMIN="pgsqladmin"
PG_PASSWORD=""                         # 비워두면 자동 생성

# ACR (컨테이너 레지스트리)
ACR_URL=""                             # 예: https://myacr.azurecr.io
ACR_TOKEN_NAME=""                      # 예: poc-pull-token
ACR_TOKEN_PASSWORD=""                  # 토큰 비밀번호 (_repositories_pull scope)
ACR_IMAGE=""                           # 예: myacr.azurecr.io/cloosphere:latest

###############################################################################
# 리소스 이름 오버라이드 — 기본값: ${CUSTOMER}-xxx
# Azure 글로벌 유니크 제약으로 충돌 시 직접 지정
###############################################################################

OPENAI_NAME=""                            # 기본값: ${CUSTOMER}-openai
DOCITG_NAME=""                            # 기본값: ${CUSTOMER}-docitg
SEARCH_NAME=""                            # 기본값: ${CUSTOMER}-search
REDIS_NAME=""                             # 기본값: ${CUSTOMER}-redis
PGSQL_NAME=""                             # 기본값: ${CUSTOMER}-pgsql

###############################################################################
# 리소스 사양 — 필요 시 조정
###############################################################################

LOCATION="koreacentral"

PG_SKU="Standard_B2s"                 # 2 vCPU, 4 GB
PG_TIER="Burstable"
PG_STORAGE=32
PG_VERSION="16"

APP_SKU="P1V4"

REDIS_SKU="Basic"
REDIS_SIZE="C1"

SEARCH_SKU="standard"                 # S1

FILE_SHARE="appdata"
BLOB_CONTAINER="media"

VNET_CIDR="10.0.0.0/16"
SUBNET_APP="10.0.1.0/26"
