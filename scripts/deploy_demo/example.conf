###############################################################################
# Cloosphere Demo 파라미터 파일
# 복사하여 환경별로 생성: cp example.conf <환경명>.conf
#
# 사용법: ./deploy-demo.sh <환경명>.conf
#         ./deploy-demo.sh <환경명>.conf delete
#
# 기존 공유 리소스(DB, OpenAI, AI Search, Document Intelligence)를 사용하고
# Redis, Storage, App Service만 신규 생성합니다.
###############################################################################

# Azure 테넌트/구독
TENANT_ID=""
SUBSCRIPTION_ID=""

# 환경명 (영문 소문자, 숫자, 하이픈 / 리소스 이름 접두사로 사용)
ENV_NAME="example"

# ACR (컨테이너 레지스트리)
ACR_URL=""                             # 예: https://myacr.azurecr.io
ACR_TOKEN_NAME=""                      # 예: demo-pull-token
ACR_TOKEN_PASSWORD=""                  # 토큰 비밀번호
ACR_IMAGE=""                           # 예: myacr.azurecr.io/cloosphere:latest

###############################################################################
# App Service 환경변수 — 배포 시 자동 등록
#
# REDIS_URL, WEBUI_SECRET_KEY는 자동 생성되므로 입력 불필요
# key=value 형태로 추가하면 App Service에 그대로 등록됩니다
###############################################################################

APP_ENV_VARS=(
    ENABLE_SIGNUP=true   
    ENABLE_LOGIN_FORM=true
    WEBUI_NAME=Cloosphere
    DATABASE_TYPE=postgresql
    DATABASE_HOST=pg-cloosphere.postgres.database.azure.com
    DATABASE_PORT=5432
    DATABASE_NAME=db_cloosphere_demo
    DATABASE_USER=cloocus
    DATABASE_PASSWORD="zmffnzjtm12#$"
    DATABASE_SSLMODE=require
    DATABASE_POOL_SIZE=10
    DATABASE_POOL_MAX_OVERFLOW=5
    DATABASE_POOL_TIMEOUT=30
    DATABASE_POOL_RECYCLE=3600
    ENABLE_LICENSE_ENFORCEMENT=false
    WEBSOCKET_MANAGER=redis
    UVICORN_WORKERS=4
)

###############################################################################
# 리소스 이름 오버라이드 — 기본값: ${ENV_NAME}-xxx
###############################################################################

APP_NAME=""                            # 필수. App Service 이름 = https://{APP_NAME}.azurewebsites.net
REDIS_NAME=""                          # 기본값: ${ENV_NAME}-redis
SA_NAME=""                             # 기본값: ${ENV_NAME}demosa

###############################################################################
# 리소스 사양 — 필요 시 조정
###############################################################################

LOCATION="koreacentral"

APP_SKU="P1V4"

REDIS_SKU="Basic"
REDIS_SIZE="C1"

FILE_SHARE="appdata"
BLOB_CONTAINER="media"
